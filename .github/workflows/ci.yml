name: Build and Test

on:
  push:

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup headless browser
      run: |
        sudo apt update
        sudo apt install chromium-bsu chromium-browser -y

    - name: Install dependencies
      run: |
        npm ci
    - name: Run tests
      run: |
        npm test
